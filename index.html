<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="google-site-verification"
          content="5saYvCzBoJhsvVpvp6X9n5IEfkKFAlcvKkuEbMak6I0" />

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>
        ISOW Properties | Agricultural, Commercial & Investment Lands
    </title>

    <meta name="description"
          content="ISOW Properties offers Agricultural Lands, Commercial Lands, DTCP Approved Plots, Farm Lands and Investment Properties across Karnataka, Tamil Nadu and Andhra Pradesh.">

    <meta name="keywords"
          content="ISOW Properties, Real Estate, Property for Sale, Land for Sale, Agricultural Land, Farm Land, Commercial Land, Industrial Land, Residential Plot, DTCP Approved Plots, Investment Property, Premium Land, Highway Frontage Land, Bangalore Land, Chennai Land, Madurai Land, Coimbatore Land, Kanchipuram Land, Andhra Pradesh Properties, Karnataka Properties, Tamil Nadu Properties, Real Estate Investment, Property Listings">

    <meta name="robots"
          content="index,follow">

    <meta name="author"
          content="ISOW Properties">

    <link rel="icon"
          href="logo.png">

    <link rel="stylesheet"
          href="style1.css">

</head>
<body>
<div class="menu-container">

    <button class="menu-btn" onclick="toggleDropdown()">
        ☰
    </button>

    <div id="dropdownMenu" class="dropdown-menu">

        <a href="index.html">
            🏠 Home
        </a>

        <a href="#requirement-section">
            📝 Enquiry
        </a>

    </div>

</div>
<header class="hero">

    <div class="hero-logo">
        <img src="logo.png" alt="ISOW Properties Logo">
        <h6>Your Property, Our Priority</h6>
    </div>

    <div class="overlay">
	
        <h1>Find Your Dream Property</h1>

        <p>Land • Villas • Commercial Properties</p>

  <div class="search-box">

    <input
        type="text"
        id="searchInput"
        list="locationsList"
        placeholder="Search City or Prime Location"
        onkeyup="searchProperty()">

    <datalist id="locationsList"></datalist>

    <button onclick="searchProperty()">
        Search
    </button>

</div>
    </div>

</header>

<section class="filters">

<select id="stateFilter"
        onchange="updateCities(); updatePrimeLocations(); filterProperties()">
</select>

<select id="cityFilter"
        onchange="updatePrimeLocations(); filterProperties()">
</select>


<select id="primeLocationFilter"
        onchange="filterProperties()">
</select>

<select id="priceFilter">

    <option value="">Any Price</option>

    <option value="1">Below ₹1 Cr</option>

    <option value="10">Below ₹10 Cr</option>

    <option value="50">Below ₹50 Cr</option>

    <option value="100">Below ₹100 Cr</option>

    <option value="200">Below ₹200 Cr</option>

    <option value="200+">Above ₹200 Cr</option>

</select>

    <button onclick="filterProperties()">Apply Filters</button>

</section>

<section>

    <h2 class="section-title">
        Featured Properties
    </h2>

    <div id="properties" class="property-container">

    </div>

</section>
<section>

    

    <div id="properties" class="property-container"></div>

</section>


<section id="requirement-section" class="requirement-section">

    <h2>📝 Post Your Requirement</h2>

    <input type="text"
           id="reqName"
           placeholder="Your Name">

    <input type="tel"
           id="reqPhone"
           placeholder="Mobile Number">

    <select id="reqState">
        <option value="">Select State</option>
        <option>Karnataka</option>
        <option>Tamil Nadu</option>
        <option>Andhra Pradesh</option>
        <option>Kerala</option>
    </select>

    <input type="text"
           id="reqCity"
           placeholder="Preferred City">

    <textarea id="reqDescription"
              placeholder="Describe Your Requirement"></textarea>

    <button onclick="submitRequirement()">
        Submit Requirement
    </button>

</section>

<footer>
<h3>ISOW Properties</h3>
    <p>Trusted Real Estate Listings</p>

</footer>

<script src="script.js"></script>

</body>
</html>
