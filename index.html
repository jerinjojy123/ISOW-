<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ISOW Properties</title>
    <link rel="stylesheet" href="style1.css">
</head>
<body>

<header class="hero">

    <div class="hero-logo">
        <img src="logo.png" alt="ISOW Properties Logo">
        <p>Your Property, Our Priority</p>
    </div>

    <div class="overlay">
	<br>
        <h1>Find Your Dream Property</h1>

        <p>Land • Villas • Commercial Properties</p>

  <div class="search-box">

    <input
        type="text"
        id="searchInput"
        list="locationsList"
        placeholder="Search City or Prime Location"
        onkeyup="searchProperty()">

    <datalist id="locationsList"></datalist>

    <button onclick="searchProperty()">
        Search
    </button>

</div>
    </div>

</header>

<section class="filters">

    <select id="cityFilter" onchange="updatePrimeLocations()">
    <option value="">All Cities</option>
    <option value="Chennai">Chennai</option>
    <option value="Coimbatore">Coimbatore</option>
    <option value="Madurai">Madurai</option>
    <option value="Bangalore">Bangalore</option>
    <option value="Hyderabad">Hyderabad</option>
</select>

<select id="primeLocationFilter">
    <option value="">All Prime Locations</option>
</select>
<select id="priceFilter">
    <option value="">Any Price</option>
    <option value="50">Below 50 Lakhs</option>
    <option value="100">Below 1 Crore</option>
    <option value="500">Below 5 Crore</option>
    <option value="1000">Below 10 Crore</option>
    <option value="2000">Below 20 Crore</option>
    <option value="2000+">Above 20 Crore</option>
</select>

    <button onclick="filterProperties()">Apply Filters</button>

</section>

<section>

    <h2 class="section-title">
        Featured Properties
    </h2>

    <div id="properties" class="property-container">

    </div>

</section>

<footer>
<h3>ISOW Properties</h3>
    <p>Trusted Real Estate Listings</p>

</footer>

<script src="script.js"></script>

</body>
</html>
